services:
  postgres:
    image: postgres:16
    container_name: rugsignal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rugsignal}
      POSTGRES_USER: ${POSTGRES_USER:-rugsignal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rugsignal}
    ports:
      - "5432:5432"
    volumes:
      - rugsignal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rugsignal} -d ${POSTGRES_DB:-rugsignal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: rugsignal-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rugsignal:rugsignal@postgres:5432/rugsignal}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-}
      SOLANA_RPC_URLS: ${SOLANA_RPC_URLS:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      TOKEN_HOLDERS_MAX_PAGES: ${TOKEN_HOLDERS_MAX_PAGES:-25}
      FEED_LIVE_SOURCE_ENABLED: ${FEED_LIVE_SOURCE_ENABLED:-true}
      FEED_LIVE_PROFILES_LIMIT: ${FEED_LIVE_PROFILES_LIMIT:-2}
      FEED_LIVE_SYNC_TTL_SECONDS: ${FEED_LIVE_SYNC_TTL_SECONDS:-60}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        API_BASE_URL: ${FRONTEND_INTERNAL_API_BASE_URL:-http://backend:8000}
    container_name: rugsignal-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: ${FRONTEND_INTERNAL_API_BASE_URL:-http://backend:8000}
    ports:
      - "3000:3000"

volumes:
  rugsignal_postgres_data:
